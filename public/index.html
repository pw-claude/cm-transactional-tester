<!DOCTYPE html>
<html>
<head>
  <title>Classic Transactional Tester</title>
  <style>
    body {
      font-family: -apple-system, sans-serif;
      background: #f5f7fb;
      padding: 40px;
      max-width: 700px;
      margin: auto;
    }

    h1 { font-size: 24px; }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin: 8px 0 16px;
      border-radius: 6px;
      border: 1px solid #ddd;
    }

    textarea {
      height: 120px;
      font-family: monospace;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }

    pre {
      background: #111;
      color: #0f0;
      padding: 15px;
      border-radius: 6px;
      white-space: pre-wrap;
    }

    .error { color: #ff4d4d; }
  </style>
</head>
<body>

<h1>Classic Transactional Email Tester</h1>

<div class="card">
<form id="form">

<label>Method</label>
<select name="method" id="method">
  <option value="api">API</option>
  <option value="smtp">SMTP</option>
</select>

<!-- API -->
<div id="apiFields">
  <label>API Key</label>
  <input name="apiKey">

  <label>Client ID</label>
  <input name="clientId">
</div>

<!-- SMTP -->
<div id="smtpFields" style="display:none;">
  <label>SMTP Username</label>
  <input name="smtpUser" placeholder="Usually your CM username">

  <label>SMTP Token</label>
  <input name="smtpToken" type="password">

  <label>SMTP Host</label>
  <input name="smtpHost" placeholder="smtp.createsend.com">

  <label>Port</label>
  <input name="smtpPort" placeholder="587">
</div>

<label>From Email</label>
<input name="fromEmail" required>

<label>Recipient Email</label>
<input name="toEmail" required>

<label>Subject</label>
<input name="subject" required>

<label>Content (HTML or Text)</label>
<textarea name="content" required></textarea>

<button type="submit">Send Test</button>

</form>
</div>

<pre id="output" style="display:none;"></pre>

<script>
const method = document.getElementById('method');
const apiFields = document.getElementById('apiFields');
const smtpFields = document.getElementById('smtpFields');

method.onchange = () => {
  apiFields.style.display = method.value === 'api' ? 'block' : 'none';
  smtpFields.style.display = method.value === 'smtp' ? 'block' : 'none';
};

document.getElementById('form').onsubmit = async (e) => {
  e.preventDefault();

  const data = Object.fromEntries(new FormData(e.target));

  const res = await fetch('/send', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(data)
  });

  const json = await res.json();

  const output = document.getElementById('output');
  output.style.display = 'block';
  output.textContent = JSON.stringify(json, null, 2);

  if (!json.success) output.classList.add('error');
  else output.classList.remove('error');
};
</script>

</body>
</html>
